<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تعبئة المنتجات — تاج الأميرة</title>
<style>
  :root{--gold:#C5A059;--dark:#0B0B0B;--bg:#F9F7F2;--line:#E6E8EB;--ok:#12805c;--req:#B42318;}
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:#1d2939;margin:0;line-height:1.8;}
  header{position:sticky;top:0;z-index:20;background:var(--dark);color:#fff;padding:14px 20px;
         display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 2px 12px rgba(0,0,0,.15);}
  header h1{font-size:18px;margin:0;color:var(--gold);}
  .prog-wrap{flex:1;min-width:180px;}
  .prog-bar{height:8px;background:#333;border-radius:6px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--gold);width:0;transition:width .3s;}
  .prog-txt{font-size:12px;color:#cbd5e1;margin-top:4px;}
  .wrap{max-width:1000px;margin:0 auto;padding:22px;}
  .card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 6px 24px rgba(0,0,0,.06);margin-bottom:18px;}
  .pnum{display:inline-block;background:var(--gold);color:var(--dark);font-weight:800;
        border-radius:8px;padding:4px 12px;font-size:15px;}
  .gallery{display:flex;gap:10px;overflow-x:auto;padding:12px 0;}
  .gallery img{height:180px;border-radius:10px;border:2px solid var(--line);cursor:pointer;flex:0 0 auto;object-fit:cover;}
  .gallery img.hero{border-color:var(--gold);box-shadow:0 0 0 3px rgba(197,160,89,.3);}
  .glabel{font-size:13px;color:#667085;font-weight:700;margin-top:6px;}
  .hero-hint{font-size:12px;color:var(--gold);font-weight:700;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field.full{grid-column:1/-1;}
  label{font-weight:700;font-size:14px;color:var(--dark);}
  label .req{color:var(--req);font-size:12px;}
  input,select,textarea{font-family:inherit;font-size:15px;padding:10px 12px;border:1.5px solid var(--line);
        border-radius:9px;background:#fff;color:#1d2939;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
  textarea{resize:vertical;min-height:64px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:6px;flex-wrap:wrap;}
  button{font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:10px;padding:12px 22px;cursor:pointer;}
  .btn-gold{background:var(--gold);color:var(--dark);}
  .btn-dark{background:var(--dark);color:#fff;}
  .btn-ghost{background:#fff;color:var(--dark);border:1.5px solid var(--line);}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .note{background:#fff8ec;border:1px solid var(--gold);border-radius:10px;padding:12px 16px;margin:14px 0;font-size:14px;}
  .en{direction:ltr;font-family:monospace;color:#667085;font-size:12px;}
  .status{font-size:13px;color:var(--ok);font-weight:700;}
  .done-badge{background:var(--ok);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;}
  .jump{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .jump button{padding:6px 11px;font-size:13px;border-radius:8px;background:#fff;border:1.5px solid var(--line);color:#475467;}
  .jump button.cur{background:var(--dark);color:var(--gold);border-color:var(--dark);}
  .jump button.filled{border-color:var(--ok);color:var(--ok);}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:50;padding:24px;}
  .lightbox img{max-width:92vw;max-height:92vh;border-radius:12px;}
  @media(max-width:760px){.grid{grid-template-columns:1fr;}.row2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <h1>تعبئة المنتجات — تاج الأميرة</h1>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-txt" id="progTxt"></div>
  </div>
  <button class="btn-gold" id="exportBtn">تصدير الملف ⬇</button>
</header>
<div class="wrap" id="app"></div>
<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>
<script>
const PRODUCTS = [{"n":1,"category":"أطقم","nameAr":"طقم ذهب عيار 21","ai":["p1-ai-band-ring.jpeg","p1-ai-cuff-bracelet.jpeg","p1-ai-jewelry-set.jpeg","p1-ai-model-hand.jpeg"],"ref":["p1-ref-1.jpeg","p1-ref-2.jpeg","p1-ref-3.jpeg","p1-ref-4.jpeg"]},{"n":2,"category":"أساور","nameAr":"إسورة ذهب عيار 21","ai":["p2-ai-clover-bead-detail.jpeg","p2-ai-cuff-on-linen.jpeg","p2-ai-cuff-travertine.jpeg","p2-ai-woman-cuff.jpeg"],"ref":["p2-ref-1.jpeg"]},{"n":3,"category":"أساور","nameAr":"إسورة ذهب ثنائية اللون","ai":["p3-ai-model-cuff.jpeg","p3-ai-twotone-cuff-1.jpeg","p3-ai-twotone-cuff-2.jpeg","p3-ai-twotone-cuff-3.jpeg"],"ref":["p3-ref-1.jpeg","p3-ref-2.jpeg","p3-ref-3.jpeg"]},{"n":4,"category":"أساور","nameAr":"إسورة ذهب حبيبات","ai":["p4-ai-beaded-detail.jpeg","p4-ai-beaded-linen.jpeg","p4-ai-beaded-travertine.jpeg","p4-ai-hand-bracelet.jpeg"],"ref":["p4-ref-1.jpeg"]},{"n":5,"category":"أطقم","nameAr":"طقم إسورة وخاتم","ai":["p5-ai-filigree-detail.jpeg","p5-ai-set-1.jpeg","p5-ai-set-2.jpeg","p5-ai-woman-set.jpeg"],"ref":["p5-ref-1.jpeg","p5-ref-2.jpeg"]},{"n":6,"category":"أطقم","nameAr":"طقم إسورة وخاتم شبك","ai":["p6-ai-hexmesh-detail.jpeg","p6-ai-set-1.jpeg","p6-ai-set-2.jpeg","p6-ai-woman-set.jpeg"],"ref":["p6-ref-1.jpeg","p6-ref-2.jpeg","p6-ref-3.jpeg","p6-ref-4.jpeg"]},{"n":7,"category":"أطقم","nameAr":"طقم غويشة وخاتم","ai":["p7-ai-screw-motif.jpeg","p7-ai-set-1.jpeg","p7-ai-set-2.jpeg","p7-ai-woman-set.jpeg"],"ref":["p7-ref-1.jpeg","p7-ref-2.jpeg","p7-ref-3.jpeg","p7-ref-4.jpeg","p7-ref-5.jpeg","p7-ref-6.jpeg"]},{"n":8,"category":"أساور","nameAr":"إسورة ذهب مجدولة","ai":["p8-ai-braided-detail.jpeg","p8-ai-twotone-linen.jpeg","p8-ai-twotone-stone.jpeg","p8-ai-woman-braided.jpeg"],"ref":["p8-ref-1.jpeg","p8-ref-2.jpeg","p8-ref-3.jpeg"]},{"n":9,"category":"أطقم","nameAr":"طقم إسورة وخاتم ملفوف","ai":["p9-ai-coiled-detail.jpeg","p9-ai-coiled-ring-1.jpeg","p9-ai-coiled-ring-2.jpeg","p9-ai-set-linen.jpeg","p9-ai-stretching.jpeg","p9-ai-woman-coiled-bracelet.jpeg","p9-ai-woman-set.jpeg"],"ref":["p9-ref-1.jpeg","p9-ref-2.jpeg","p9-ref-3.jpeg","p9-ref-4.jpeg","p9-ref-5.jpeg","p9-ref-6.jpeg","p9-ref-7.jpeg","p9-ref-8.jpeg"]},{"n":10,"category":"قلائد","nameAr":"عقد ذهب بدلاية بيضاوية","ai":["p10-ai-necklace-linen.jpeg","p10-ai-oval-pendant.jpeg","p10-ai-pendant-detail.jpeg","p10-ai-woman-pendant.jpeg"],"ref":["p10-ref-1.jpeg","p10-ref-2.jpeg"]},{"n":11,"category":"قلائد","nameAr":"عقد ذهب بدلايات ألماس","ai":["p11-ai-diamond-pendants.jpeg","p11-ai-necklace-drops.jpeg","p11-ai-necklace-silk.jpeg","p11-ai-woman-pendant.jpeg"],"ref":["p11-ref-1.jpeg","p11-ref-2.jpeg","p11-ref-3.jpeg"]},{"n":12,"category":"قلائد","nameAr":"عقد ذهب بتعليقات","ai":["p12-ai-ball-chain-teardrop-1.jpeg","p12-ai-ball-chain-teardrop-2.jpeg","p12-ai-bead-chain-charms.jpeg","p12-ai-multi-charm-stone.jpeg","p12-ai-woman-necklace.jpeg"],"ref":["p12-ref-1.jpeg","p12-ref-2.jpeg"]},{"n":13,"category":"قلائد","nameAr":"عقد ذهب ثنائي اللون","ai":["p13-ai-gold-white-chain.jpeg","p13-ai-two-tone-chain-1.jpeg","p13-ai-two-tone-chain-2.jpeg","p13-ai-two-tone-chain-3.jpeg","p13-ai-woman-necklace.jpeg"],"ref":["p13-ref-1.jpeg"]},{"n":14,"category":"قلائد","nameAr":"عقد ذهب بسيط","ai":["p14-ai-bead-detail.jpeg","p14-ai-minimalist-necklace.jpeg","p14-ai-necklace-travertine.jpeg","p14-ai-woman-necklace.jpeg"],"ref":["p14-ref-1.jpeg","p14-ref-2.jpeg","p14-ref-3.jpeg"]},{"n":15,"category":"قلائد","nameAr":"عقد ذهب بدلاية حجر","ai":["p15-ai-chain-gemstone.jpeg","p15-ai-fan-pendant-detail.jpeg","p15-ai-gemstone-pendant.jpeg","p15-ai-woman-necklace.jpeg"],"ref":["p15-ref-1.jpeg","p15-ref-2.jpeg","p15-ref-3.jpeg"]},{"n":16,"category":"قلائد","nameAr":"عقد ذهب ميدالية","ai":["p16-ai-medallion-gemstone-2k.jpeg","p16-ai-medallion-gemstone.jpeg","p16-ai-multi-gem.jpeg","p16-ai-woman-medallion.jpeg"],"ref":["p16-ref-1.jpeg","p16-ref-2.jpeg","p16-ref-3.jpeg"]},{"n":17,"category":"قلائد","nameAr":"عقد ذهب حجر فيروز","ai":["p17-ai-turquoise-bead-1.jpeg","p17-ai-turquoise-bead-2.jpeg","p17-ai-turquoise-center.jpeg","p17-ai-woman-turquoise.jpeg"],"ref":["p17-ref-1.jpeg","p17-ref-2.jpeg","p17-ref-3.jpeg"]},{"n":18,"category":"خواتم","nameAr":"خاتم ذهب ملفوف","ai":["p18-ai-texture-detail.jpeg","p18-ai-twisted-band.jpeg","p18-ai-twisted-texture.jpeg","p18-ai-woman-ring.jpeg"],"ref":["p18-ref-1.jpeg"]},{"n":19,"category":"خواتم","nameAr":"خاتم ذهب مفتوح","ai":["p19-ai-bypass-detail.jpeg","p19-ai-open-ring-texture.jpeg","p19-ai-ring-travertine.jpeg","p19-ai-woman-ring.jpeg"],"ref":["p19-ref-1.jpeg"]},{"n":20,"category":"خواتم","nameAr":"خاتم ذهب بتصميم سلسلة","ai":["p20-ai-chain-design-1.jpeg","p20-ai-chain-design-2.jpeg","p20-ai-integrated-chain.jpeg","p20-ai-woman-ring.jpeg"],"ref":["p20-ref-1.jpeg"]},{"n":21,"category":"خواتم","nameAr":"خاتم ذهب حلقات","ai":["p21-ai-chain-design-1.jpeg","p21-ai-chain-design-2.jpeg","p21-ai-woman-ring.jpeg","p21-ai-yellow-band.jpeg"],"ref":["p21-ref-1.jpeg"]},{"n":22,"category":"خواتم","nameAr":"خاتم ذهب مفرّغ","ai":["p22-ai-on-linen-1.jpeg","p22-ai-on-linen-2.jpeg","p22-ai-openwork-1.jpeg","p22-ai-openwork-2.jpeg","p22-ai-woman-hand.jpeg"],"ref":["p22-ref-1.jpeg"]},{"n":23,"category":"خواتم","nameAr":"خاتم ذهب سادة","ai":["p23-ai-band-detail.jpeg","p23-ai-woman-ring.jpeg","p23-ai-yellow-band-1.jpeg","p23-ai-yellow-band-2.jpeg"],"ref":["p23-ref-1.jpeg"]},{"n":24,"category":"خواتم","nameAr":"خاتم ذهب مجدول","ai":["p24-ai-torsade-1.jpeg","p24-ai-twisted-travertine.jpeg","p24-ai-wirework.jpeg","p24-ai-woman-ring.jpeg"],"ref":["p24-ref-1.jpeg"]},{"n":25,"category":"خواتم","nameAr":"خاتم ذهب نقشة إغريقية","ai":["p25-ai-greek-key-1.jpeg","p25-ai-greek-key-2.jpeg","p25-ai-greek-key-pattern.jpeg","p25-ai-woman-ring.jpeg"],"ref":["p25-ref-1.jpeg"]},{"n":26,"category":"خواتم","nameAr":"خاتم ذهب هندسي","ai":["p26-ai-geometric.jpeg","p26-ai-on-linen.jpeg","p26-ai-solid-band.jpeg","p26-ai-woman-ring.jpeg"],"ref":["p26-ref-1.jpeg"]},{"n":27,"category":"خواتم","nameAr":"خاتم ذهب حافة منقوشة","ai":["p27-ai-textured-crown.jpeg","p27-ai-textured-edge.jpeg","p27-ai-woman-ring.jpeg"],"ref":["p27-ref-1.jpeg"]},{"n":28,"category":"أساور","nameAr":"إسورة ذهب حبيبات (ألماس)","ai":["p28-ai-bead-linen.jpeg","p28-ai-bead-stone.jpeg","p28-ai-pave-diamonds.jpeg","p28-ai-woman-bracelet.jpeg"],"ref":["p28-ref-1.jpeg"]}];
const CATS = ["خواتم","أساور","قلائد","أطقم","أقراط"];
const KARATS = ["24","21","18"];
const COLORS = ["أصفر","أبيض","وردي","ثنائي اللون"];
const STORE_KEY = "taj-products-v1";
const FIELDS = ["nameAr","nameEn","category","karat","color","weight","makingType","makingValue","stones","size","qty","sku","hero","desc","notes"];
let state = load();
let idx = 0;

function load(){
  let saved={};
  try{ saved = JSON.parse(localStorage.getItem(STORE_KEY)||"{}"); }catch(e){}
  const st={};
  PRODUCTS.forEach(p=>{
    const s = saved[p.n]||{};
    st[p.n]={
      nameAr:s.nameAr??p.nameAr, nameEn:s.nameEn??"", category:s.category??p.category,
      karat:s.karat??"21", color:s.color??"أصفر", weight:s.weight??"",
      makingType:s.makingType??"لكل جرام", makingValue:s.makingValue??"",
      stones:s.stones??"", size:s.size??"", qty:s.qty??"1", sku:s.sku??"",
      hero:s.hero??(p.ai[0]||""), desc:s.desc??"", notes:s.notes??""
    };
  });
  return st;
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function isDone(n){
  const s=state[n];
  return s.nameAr && s.category && s.karat && s.weight && s.makingValue;
}
function doneCount(){ return PRODUCTS.filter(p=>isDone(p.n)).length; }

function imgPath(n,folder,file){ return `products/product-${n}/${folder}/${file}`; }
function opt(list,cur){ return list.map(v=>`<option${v===cur?" selected":""}>${v}</option>`).join(""); }

function render(){
  const p = PRODUCTS[idx];
  const s = state[p.n];
  const total = PRODUCTS.length;
  const dc = doneCount();
  document.getElementById("progFill").style.width = (dc/total*100)+"%";
  document.getElementById("progTxt").textContent = `مكتمل ${dc} من ${total} منتج`;

  const aiImgs = p.ai.map(f=>`<div style="text-align:center"><img src="${imgPath(p.n,'ai',f)}" class="${s.hero===f?'hero':''}" data-hero="${f}" title="اضغط لتعيينها كصورة رئيسية"><div class="glabel">${s.hero===f?'⭐ رئيسية':''}</div></div>`).join("");
  const refImgs = p.ref.map(f=>`<img src="${imgPath(p.n,'ref',f)}" data-zoom="${imgPath(p.n,'ref',f)}">`).join("");

  document.getElementById("app").innerHTML = `
  <div class="card">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span class="pnum">منتج #${p.n}</span>
      ${isDone(p.n)?'<span class="done-badge">مكتمل ✓</span>':''}
      <span class="hero-hint">⭐ اضغط على صورة AI لتعيينها رئيسية</span>
    </div>
    <div class="glabel">صور AI (اختر الرئيسية):</div>
    <div class="gallery">${aiImgs}</div>
    ${p.ref.length?`<div class="glabel">صور حقيقية (مرجع فقط — اضغط للتكبير):</div><div class="gallery">${refImgs}</div>`:''}
  </div>

  <div class="card">
    <div class="grid">
      <div class="field"><label>الاسم (عربي) <span class="req">*</span></label><input id="f-nameAr" value="${esc(s.nameAr)}"></div>
      <div class="field"><label>الاسم (انجليزي)</label><input id="f-nameEn" value="${esc(s.nameEn)}" class="en" placeholder="e.g. 21K Ring"></div>
      <div class="field"><label>التصنيف <span class="req">*</span></label><select id="f-category">${opt(CATS,s.category)}</select></div>
      <div class="field"><label>العيار <span class="req">*</span></label><select id="f-karat">${opt(KARATS,s.karat)}</select></div>
      <div class="field"><label>لون الذهب</label><select id="f-color">${opt(COLORS,s.color)}</select></div>
      <div class="field"><label>الوزن بالجرام <span class="req">*</span></label><input id="f-weight" type="number" step="0.01" value="${esc(s.weight)}" placeholder="مثال 5.20"></div>
      <div class="field"><label>المصنعية <span class="req">*</span></label>
        <div class="row2"><select id="f-makingType">${opt(["لكل جرام","مبلغ ثابت"],s.makingType)}</select>
        <input id="f-makingValue" type="number" step="0.01" value="${esc(s.makingValue)}" placeholder="ريال"></div></div>
      <div class="field"><label>الأحجار (قيمة بالريال، إن وجدت)</label><input id="f-stones" value="${esc(s.stones)}" placeholder="مثال: ألماس 300"></div>
      <div class="field"><label>المقاس</label><input id="f-size" value="${esc(s.size)}" placeholder="للخواتم"></div>
      <div class="field"><label>الكمية المتوفرة</label><input id="f-qty" type="number" value="${esc(s.qty)}"></div>
      <div class="field"><label>SKU (اختياري)</label><input id="f-sku" value="${esc(s.sku)}" class="en"></div>
      <div class="field full"><label>الوصف (عربي)</label><textarea id="f-desc">${esc(s.desc)}</textarea></div>
      <div class="field full"><label>ملاحظات</label><textarea id="f-notes">${esc(s.notes)}</textarea></div>
    </div>
    <div class="note">السعر يتحسّب تلقائي: (الوزن × سعر جرام الذهب اليوم حسب العيار) + المصنعية + ضريبة ١٥٪. لا تكتب سعر نهائي.</div>
    <div class="nav">
      <button class="btn-ghost" id="prevBtn" ${idx===0?'disabled':''}>◀ السابق</button>
      <span class="status" id="saveStatus"></span>
      <button class="btn-dark" id="nextBtn">${idx===total-1?'إنهاء':'التالي ▶'}</button>
    </div>
    <div class="jump" id="jump"></div>
  </div>`;

  bind(p);
  renderJump();
}
function esc(v){ return String(v==null?"":v).replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

function bind(p){
  const s = state[p.n];
  const map = {nameAr:"f-nameAr",nameEn:"f-nameEn",category:"f-category",karat:"f-karat",
    color:"f-color",weight:"f-weight",makingType:"f-makingType",makingValue:"f-makingValue",
    stones:"f-stones",size:"f-size",qty:"f-qty",sku:"f-sku",desc:"f-desc",notes:"f-notes"};
  Object.keys(map).forEach(k=>{
    const el=document.getElementById(map[k]);
    if(!el)return;
    el.addEventListener("input",()=>{ s[k]=el.value; save(); flashSaved(); });
    el.addEventListener("change",()=>{ s[k]=el.value; save(); flashSaved(); });
  });
  document.querySelectorAll("[data-hero]").forEach(img=>{
    img.addEventListener("click",()=>{ s.hero=img.getAttribute("data-hero"); save(); render(); });
  });
  document.querySelectorAll("[data-zoom]").forEach(img=>{
    img.addEventListener("click",()=>{ showLightbox(img.getAttribute("data-zoom")); });
  });
  document.getElementById("prevBtn").onclick=()=>{ if(idx>0){idx--;window.scrollTo(0,0);render();} };
  document.getElementById("nextBtn").onclick=()=>{
    if(idx<PRODUCTS.length-1){idx++;window.scrollTo(0,0);render();}
    else{ finish(); }
  };
}
function flashSaved(){
  const el=document.getElementById("saveStatus");
  if(el){ el.textContent="✓ محفوظ تلقائياً"; clearTimeout(flashSaved._t); flashSaved._t=setTimeout(()=>{if(el)el.textContent="";},1200); }
  document.getElementById("progFill").style.width=(doneCount()/PRODUCTS.length*100)+"%";
  document.getElementById("progTxt").textContent=`مكتمل ${doneCount()} من ${PRODUCTS.length} منتج`;
}
function renderJump(){
  const el=document.getElementById("jump");
  el.innerHTML = PRODUCTS.map((p,i)=>`<button data-i="${i}" class="${i===idx?'cur':''} ${isDone(p.n)?'filled':''}">${p.n}</button>`).join("");
  el.querySelectorAll("button").forEach(b=>b.onclick=()=>{ idx=+b.getAttribute("data-i"); window.scrollTo(0,0); render(); });
}
function showLightbox(src){
  document.getElementById("lightboxImg").src=src;
  document.getElementById("lightbox").style.display="flex";
}
document.getElementById("lightbox").onclick=()=>{ document.getElementById("lightbox").style.display="none"; };
function csvCell(v){ v=String(v==null?"":v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function buildCSV(){
  const head=["رقم المنتج","اسم عربي","اسم انجليزي","التصنيف","العيار","لون الذهب","الوزن بالجرام","نوع المصنعية","قيمة المصنعية","الأحجار","المقاس","الكمية","SKU","الصورة الرئيسية","الوصف","ملاحظات"];
  const rows=PRODUCTS.map(p=>{
    const s=state[p.n];
    return [p.n,s.nameAr,s.nameEn,s.category,s.karat,s.color,s.weight,s.makingType,s.makingValue,s.stones,s.size,s.qty,s.sku,s.hero,s.desc,s.notes].map(csvCell).join(",");
  });
  return "\uFEFF"+[head.join(","),...rows].join("\n");
}
function download(name,content,type){
  const blob=new Blob([content],{type});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
document.getElementById("exportBtn").onclick=exportAll;
function exportAll(){
  download("taj-products.csv",buildCSV(),"text/csv;charset=utf-8");
  const json=PRODUCTS.map(p=>({n:p.n,...state[p.n]}));
  download("taj-products.json",JSON.stringify(json,null,2),"application/json");
}
function finish(){
  const missing=PRODUCTS.filter(p=>!isDone(p.n)).map(p=>p.n);
  if(missing.length){
    alert("ناقص حقول مطلوبة في المنتجات: "+missing.join("، ")+"\nممكن تصدّر الحين وتكمّل لاحقاً — الملف يحفظ كل شي.");
  }else{
    alert("كل المنتجات مكتملة ✓ جاري تنزيل الملف.");
  }
  exportAll();
}
render();
</script>
</body>
