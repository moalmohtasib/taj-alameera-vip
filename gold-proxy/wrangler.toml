name = "taj-gold-proxy"
main = "src/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Option A = pure spot math via fetch(). No headless browser needed anymore,
# so the Browser Rendering binding is removed (faster, cheaper, more reliable).

# KV namespace stores the last computed prices. Create it once with:
#   npx wrangler kv namespace create GOLD_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "GOLD_KV"
id = "3a8ce9f0412f4fe2b96f1b5a5d4c22ac"

# Recompute every 1 minute.
[triggers]
crons = ["* * * * *"]

[vars]
# Spot gold price feed (USD per troy ounce), keyless.
SPOT_URL = "https://api.gold-api.com/price/XAU"
# SAMA-fixed USD->SAR peg. Constant.
USD_SAR_PEG = "3.75"
# Market premium multiplier over bare spot. 1 = pure spot (bullion) price.
# Owner can bump to e.g. "1.02" to mirror local retail markup if desired.
MARKET_PREMIUM = "1"
